<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1f2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WR.GG">
<title>WR.GG — Wild Rift Champion Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

:root{--bg0:#0d1117;--bg1:#161b27;--bg2:#1e2538;--bg3:#252d42;--border:rgba(255,255,255,0.06);--border-hi:rgba(255,255,255,0.12);--blue:#4f8ef7;--blue-dim:rgba(79,142,247,0.12);--teal:#00c9a7;--teal-dim:rgba(0,201,167,0.1);--gold:#f0b429;--red:#f56565;--green:#48bb78;--purple:#9f7aea;--text:#e8ecf4;--text2:#8892a4;--text3:#4a5568;--font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;--r:8px;--rs:5px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg0);scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg0);color:var(--text);min-height:100vh;overflow-x:hidden}
.topbar{background:var(--bg1);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200;backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--teal));border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;letter-spacing:-.5px}
.logo-text{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.logo-text span{color:var(--blue)}
.topbar-right{display:flex;align-items:center;gap:10px}
.patch-chip{font-size:11px;font-family:var(--mono);background:rgba(79,142,247,0.12);color:var(--blue);border:1px solid rgba(79,142,247,0.25);border-radius:20px;padding:4px 10px;cursor:pointer;transition:all .15s}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.sdot.live{background:var(--teal);box-shadow:0 0 8px rgba(0,201,167,0.6);animation:glow 2s infinite}
.sdot.loading{background:var(--gold);animation:glow 1s infinite}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.4}}
.hero{background:linear-gradient(180deg,var(--bg1),var(--bg0));padding:40px 24px 32px;text-align:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(79,142,247,0.07),transparent 60%);pointer-events:none}
.hero-title{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.hero-title span{color:var(--blue)}
.hero-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.srch-box{max-width:520px;margin:0 auto;position:relative}
.srch-inp{width:100%;background:var(--bg2);border:1.5px solid var(--border-hi);border-radius:10px;padding:13px 16px 13px 44px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:all .2s}
.srch-inp:focus{border-color:var(--blue);background:var(--bg1);box-shadow:0 0 0 3px rgba(79,142,247,0.1)}
.srch-inp::placeholder{color:var(--text3)}
.srch-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.srch-ico svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}
.srch-res{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg2);border:1px solid var(--border-hi);border-radius:var(--r);overflow:hidden;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,0.5);display:none}
.srch-res.open{display:block}
.sr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s}
.sr-item:hover{background:var(--bg3)}
.sr-img{width:36px;height:36px;border-radius:6px;object-fit:cover;object-position:center top;background:var(--bg3)}
.main{max-width:1200px;margin:0 auto;padding:24px 24px 80px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.sec-title{font-size:17px;font-weight:600;letter-spacing:-.2px}
.sec-title span{color:var(--blue)}
.role-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.role-tab{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;white-space:nowrap;font-family:var(--font)}
.role-tab:hover{border-color:var(--border-hi);color:var(--text)}
.role-tab.active{background:rgba(79,142,247,0.12);border-color:rgba(79,142,247,.4);color:var(--blue)}
.tier-table{display:none;width:100%;border-collapse:separate;border-spacing:0}
@media(min-width:769px){.tier-table{display:table}}
.tier-table th{padding:10px 14px;font-size:11px;font-weight:500;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;background:var(--bg1);position:sticky;top:56px;z-index:10}
.tier-table td{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg1);transition:background .1s;cursor:pointer}
.tier-table tr:hover td{background:var(--bg2)}
.tier-table tr:last-child td{border-bottom:none}
.tbadge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;font-weight:700;font-size:13px;font-family:var(--mono)}
.tb-sp{background:rgba(240,180,41,.15);color:var(--gold);border:1px solid rgba(240,180,41,.35)}
.tb-s{background:rgba(79,142,247,.12);color:var(--blue);border:1px solid rgba(79,142,247,.3)}
.tb-a{background:rgba(0,201,167,.1);color:var(--teal);border:1px solid rgba(0,201,167,.25)}
.tb-b{background:rgba(159,122,234,.1);color:var(--purple);border:1px solid rgba(159,122,234,.2)}
.champ-cell{display:flex;align-items:center;gap:10px}
.champ-av{width:40px;height:40px;border-radius:var(--rs);object-fit:cover;object-position:center top;background:var(--bg3)}
.champ-name{font-size:13px;font-weight:600}
.champ-role-lbl{font-size:11px;color:var(--text2)}
.wr-bar{display:flex;align-items:center;gap:8px}
.wr-fill{height:4px;border-radius:2px;background:var(--bg3);width:60px;overflow:hidden}
.wr-inner{height:100%;border-radius:2px;background:var(--blue)}
.wr-inner.hi{background:var(--teal)}
.wr-inner.lo{background:var(--text3)}
.stat-hi{color:var(--teal)}
.stat-mid{color:var(--text)}
.stat-lo{color:var(--text2)}
.stat-ban{color:var(--red)}
.tier-cards{display:block}
@media(min-width:769px){.tier-cards{display:none}}
.tier-group{margin-bottom:18px}
.tier-group-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.champ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px}
.champ-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .15s}
.champ-card:active{transform:scale(.97)}
.cc-img{width:100%;aspect-ratio:1;object-fit:cover;object-position:center top;background:var(--bg3);display:block}
.cc-body{padding:5px 6px 6px}
.cc-name{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-wr{font-size:9px;font-family:var(--mono)}
.page{display:none}
.page.active{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.champ-page{display:none}
.champ-page.open{display:block;animation:fi .2s ease}
.cp-back{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;cursor:pointer;margin-bottom:20px;padding:6px 0;background:none;border:none;font-family:var(--font);transition:color .15s}
.cp-back:hover{color:var(--text)}
.cp-back svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.cp-splash{position:relative;height:220px;border-radius:12px;overflow:hidden;margin-bottom:24px}
@media(min-width:769px){.cp-splash{height:290px}}
.cp-splash-bg{position:absolute;inset:0;background-size:cover;background-position:center 15%;filter:brightness(.55)}
.cp-grad{position:absolute;inset:0;background:linear-gradient(to right,rgba(13,17,23,.95) 25%,rgba(13,17,23,.3))}
@media(max-width:768px){.cp-grad{background:linear-gradient(to bottom,rgba(13,17,23,.2),rgba(13,17,23,.93) 70%)}}
.cp-content{position:relative;z-index:1;padding:22px;height:100%;display:flex;flex-direction:column;justify-content:flex-end}
@media(min-width:769px){.cp-content{flex-direction:row;align-items:flex-end;justify-content:space-between}}
.cp-left{display:flex;align-items:flex-end;gap:14px}
.cp-portrait{width:70px;height:70px;border-radius:10px;object-fit:cover;object-position:center top;border:2px solid var(--blue);flex-shrink:0}
@media(min-width:769px){.cp-portrait{width:86px;height:86px}}
.cp-name{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1}
@media(min-width:769px){.cp-name{font-size:32px}}
.cp-subtitle{font-size:12px;color:rgba(232,236,244,.6);margin-top:3px}
.cp-tags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.cp-tag{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.07);color:rgba(232,236,244,.7);border:1px solid rgba(255,255,255,.1)}
.cp-tag.blue{background:rgba(79,142,247,.15);color:var(--blue);border-color:rgba(79,142,247,.3)}
.cp-tag.teal{background:rgba(0,201,167,.12);color:var(--teal);border-color:rgba(0,201,167,.25)}
.cp-stats{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
@media(min-width:769px){.cp-stats{flex-direction:column;align-items:flex-end;gap:8px;margin-top:0}}
.cp-stat-val{font-size:22px;font-weight:700;font-family:var(--mono)}
.cp-stat-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
@media(min-width:769px){.cp-stat-lbl{text-align:right}}
.cp-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;gap:0}
.cp-tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font);transition:all .2s}
.cp-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.cp-panel{display:none}
.cp-panel.active{display:block;animation:fi .15s ease}
.cp-grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:769px){.cp-grid{grid-template-columns:1fr 320px}}
.info-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.ic-hdr{padding:11px 15px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text2)}
.ic-body{padding:14px 15px}
.items-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.item-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.item-slot{position:relative;width:44px;height:44px;border-radius:var(--rs);background:var(--bg3);border:1px solid var(--border);overflow:hidden}
.item-slot img{width:100%;height:100%;object-fit:cover;display:block}
.item-num{position:absolute;bottom:1px;right:2px;font-size:8px;font-weight:700;color:var(--gold);font-family:var(--mono);background:rgba(0,0,0,.8);border-radius:2px;padding:0 2px;line-height:1.4}
.item-lbl{font-size:9px;color:var(--text2);max-width:44px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-align:center}
.item-list{display:flex;flex-direction:column;gap:0}
.item-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-row img{width:32px;height:32px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.item-row-n{font-size:11px;font-weight:600;width:14px;color:var(--gold);font-family:var(--mono);flex-shrink:0}
.item-row-name{font-size:12px;font-weight:500;flex:1}
.item-row-tip{font-size:11px;color:var(--text2)}
.rune-grid{display:flex;flex-direction:column;gap:6px}
.rune-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg2);border-radius:var(--rs)}
.rune-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rd-k{background:var(--gold)}
.rd-s{background:var(--blue)}
.rd-t{background:var(--text3)}
.rune-n{font-size:12px;font-weight:500}
.rune-d{font-size:11px;color:var(--text2);margin-left:auto}
.tip-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;margin-bottom:7px;font-size:12px;color:rgba(232,236,244,.75);line-height:1.65}
.tip-card:last-child{margin-bottom:0}
.tip-card strong{color:var(--gold);font-weight:500}
.ability-grid{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:480px){.ability-grid{grid-template-columns:repeat(3,1fr)}}
.ab-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;transition:border-color .15s}
.ab-card:hover{border-color:var(--border-hi)}
.ab-key{font-size:10px;font-weight:700;color:var(--blue);font-family:var(--mono);margin-bottom:3px}
.ab-name{font-size:12px;font-weight:600;margin-bottom:4px}
.ab-desc{font-size:11px;color:var(--text2);line-height:1.5}
.diff-bar{display:flex;gap:4px;align-items:center}
.diff-seg{height:6px;width:22px;border-radius:2px;background:var(--bg3)}
.diff-seg.on{background:var(--gold)}
.ctr-list{display:flex;flex-direction:column}
.ctr-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .1s}
.ctr-row:last-child{border-bottom:none}
.ctr-row:hover{opacity:.8}
.co-av{width:42px;height:42px;border-radius:var(--rs);object-fit:cover;object-position:center top;background:var(--bg3);flex-shrink:0}
.co-info{flex:1;min-width:0}
.co-name{font-size:13px;font-weight:600;margin-bottom:2px}
.co-reason{font-size:11px;color:var(--text2);line-height:1.4}
.co-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.cb-h{background:rgba(245,101,101,.12);color:var(--red);border:1px solid rgba(245,101,101,.25)}
.cb-s{background:rgba(240,180,41,.12);color:var(--gold);border:1px solid rgba(240,180,41,.25)}
.cb-w{background:rgba(72,187,120,.1);color:var(--green);border:1px solid rgba(72,187,120,.2)}
.stats-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sm{background:var(--bg2);border-radius:var(--rs);padding:10px 12px;text-align:center}
.sm-val{font-size:19px;font-weight:700;font-family:var(--mono)}
.sm-lbl{font-size:10px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.chg-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
.chg-buff{background:rgba(72,187,120,.12);color:var(--green)}
.chg-nerf{background:rgba(245,101,101,.12);color:var(--red)}
.chg-adj{background:rgba(79,142,247,.1);color:var(--blue)}
.patch-list{display:flex;flex-direction:column;gap:8px}
.pi{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:border-color .15s}
.pi:hover{border-color:var(--border-hi)}
.pi-bar{width:3px;min-height:36px;border-radius:2px;flex-shrink:0;align-self:stretch}
.pi-buff{background:var(--green)}
.pi-nerf{background:var(--red)}
.pi-adj{background:var(--blue)}
.pi-img{width:40px;height:40px;border-radius:var(--rs);object-fit:cover;object-position:center top;background:var(--bg3);flex-shrink:0}
.pi-name{font-size:13px;font-weight:600;margin-bottom:3px}
.pi-desc{font-size:11px;color:var(--text2);line-height:1.4}
.ai-wrap{max-width:680px;margin:0 auto}
.ai-msgs{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;min-height:100px}
.ai-msg{padding:12px 14px;border-radius:var(--r);font-size:13px;line-height:1.65;animation:fi .2s ease}
.ai-user{background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.2);margin-left:36px}
.ai-bot{background:var(--bg1);border:1px solid var(--border);margin-right:36px}
.ai-bot strong{color:var(--gold);font-weight:500}
.ai-think{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);margin-right:36px;font-size:12px;color:var(--text2)}
.ai-d{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--blue);margin:0 2px;animation:bou .9s infinite}
.ai-d:nth-child(2){animation-delay:.15s}
.ai-d:nth-child(3){animation-delay:.3s}
@keyframes bou{0%,60%,100%{opacity:.2;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
.ai-qbtns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.ai-qbtn{font-size:11px;padding:6px 12px;background:var(--bg1);border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .15s}
.ai-qbtn:hover{color:var(--text);border-color:var(--border-hi)}
.ai-row{display:flex;gap:8px;margin-top:10px}
.ai-inp{flex:1;background:var(--bg1);border:1.5px solid var(--border-hi);border-radius:var(--r);padding:11px 14px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;resize:none;height:44px;transition:border-color .2s}
.ai-inp:focus{border-color:var(--blue)}
.ai-inp::placeholder{color:var(--text3)}
.ai-send{width:44px;height:44px;background:var(--blue);border:none;border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .15s}
.ai-send:disabled{opacity:.3}
.ai-send svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(22,27,39,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);z-index:200;padding-bottom:env(safe-area-inset-bottom)}
@media(max-width:768px){.mobile-nav{display:flex}}
.mnb{flex:1;padding:9px 4px 7px;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;color:var(--text2);cursor:pointer;font-family:var(--font);font-size:10px;transition:color .2s}
.mnb.active{color:var(--blue)}
.mnb svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round}
.desk-nav{display:none;gap:4px}
@media(min-width:769px){.desk-nav{display:flex}}
.dnb{padding:7px 14px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-radius:var(--rs);background:none;border:none;font-family:var(--font);transition:all .15s}
.dnb:hover{color:var(--text);background:var(--bg2)}
.dnb.active{color:var(--blue);background:rgba(79,142,247,.12)}
.spinner{display:flex;justify-content:center;padding:40px;gap:6px}
.sp{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:bou .9s infinite}
.sp:nth-child(2){animation-delay:.15s}
.sp:nth-child(3){animation-delay:.3s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
@media(max-width:768px){.topbar{padding:0 14px}.hero{padding:24px 14px 20px}.hero-title{font-size:20px}.main{padding:16px 14px 80px}}

</style>
</head>
<body>

<div class="topbar">
  <div class="logo" onclick="showPage('champions');closeChamp()">
    <div class="logo-icon">WR</div>
    <div class="logo-text">WR<span>.GG</span></div>
  </div>
  <nav class="desk-nav">

let curRole='all',aiHistory=[],aiLoading=false;
function tCls(t){return{['S+']:'tb-sp',S:'tb-s',A:'tb-a',B:'tb-b'}[t]||'tb-b'}
function wrC(w){return w>=53?'stat-hi':w>=49?'stat-mid':'stat-lo'}
function brC(b){return b>=20?'stat-ban':b>=10?'stat-mid':'stat-lo'}
async function fetchLive(){
  document.getElementById('sdot').className='sdot loading';
  document.getElementById('pchip').textContent='...';
  try{
    const r=await fetch('https://ry2x.github.io/WildRift-Champs/hero.json',{signal:AbortSignal.timeout(8000)});
    if(!r.ok)throw new Error();
    await r.json();
    document.getElementById('sdot').className='sdot live';
    document.getElementById('pchip').textContent='Patch 7.1d ✓';
    document.getElementById('live-badge').textContent=`En vivo · ${CHAMPS.length} campeones`;
    setTimeout(()=>document.getElementById('pchip').textContent='Patch 7.1d ↻',3000);
  }catch{
    document.getElementById('sdot').className='sdot';
    document.getElementById('pchip').textContent='Patch 7.1d';
    document.getElementById('live-badge').textContent=`Datos locales · ${CHAMPS.length} campeones`;
  }
}
function onSearch(v){
  const box=document.getElementById('srch-res');
  if(!v||v.length<1){box.classList.remove('open');return}
  const m=CHAMPS.filter(c=>c.n.toLowerCase().includes(v.toLowerCase())).slice(0,6);
  if(!m.length){box.classList.remove('open');return}
  box.innerHTML=m.map(c=>`<div class="sr-item" onclick="openChamp('${c.n}');document.getElementById('srch').value='';document.getElementById('srch-res').classList.remove('open')"><img class="sr-img" src="${cImg(c.n)}" onerror="this.style.background='var(--bg3)'"><div><div style="font-size:13px;font-weight:500">${c.n}</div><div style="font-size:11px;color:var(--text2)">${c.role} · ${c.tier}</div></div></div>`).join('');
  box.classList.add('open');
}
document.addEventListener('click',e=>{if(!e.target.closest('.srch-box'))document.getElementById('srch-res').classList.remove('open')});
function filterRole(role,btn){
  curRole=role;
  document.querySelectorAll('.role-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tier-rl').textContent='— '+(role==='all'?'Todos los roles':role.charAt(0).toUpperCase()+role.slice(1));
  renderTier();
}
function renderTier(){
  const list=curRole==='all'?CHAMPS:CHAMPS.filter(c=>c.role===curRole);
  const sorted=[...list].sort((a,b)=>{const o={'S+':0,S:1,A:2,B:3};return(o[a.tier]||3)-(o[b.tier]||3)||(b.wr-a.wr)});
  document.getElementById('tier-tbody').innerHTML=sorted.map(c=>`<tr onclick="openChamp('${c.n}')">
    <td style="width:52px;text-align:center"><div class="tbadge ${tCls(c.tier)}">${c.tier}</div></td>
    <td><div class="champ-cell"><img class="champ-av" src="${cImg(c.n)}" onerror="this.style.background='var(--bg3)'"><div><div class="champ-name">${c.n}</div><div class="champ-role-lbl">${c.role}</div></div></div></td>
    <td style="width:130px;text-align:right;font-family:var(--mono);font-size:12px"><div class="wr-bar"><span class="${wrC(c.wr)}">${c.wr.toFixed(1)}%</span><div class="wr-fill"><div class="wr-inner${c.wr>=53?' hi':c.wr<49?' lo':''}" style="width:${Math.min(100,(c.wr-44)*10)}%"></div></div></div></td>
    <td style="width:100px;text-align:right;font-family:var(--mono);font-size:12px"><span class="stat-mid">${c.pr.toFixed(1)}%</span></td>
    <td style="width:100px;text-align:right;font-family:var(--mono);font-size:12px"><span class="${brC(c.br)}">${c.br.toFixed(1)}%</span></td>
    <td style="width:70px;text-align:center">${c.change==='buff'?'<span style="color:var(--green);font-size:14px">↑</span>':c.change==='nerf'?'<span style="color:var(--red);font-size:14px">↓</span>':'<span style="color:var(--text3)">—</span>'}</td>
  </tr>`).join('');
  const tiers=['S+','S','A','B'];
  document.getElementById('tier-cards').innerHTML=tiers.map(tier=>{
    const g=sorted.filter(c=>c.tier===tier);
    if(!g.length)return'';
    return`<div class="tier-group"><div class="tier-group-hdr"><div class="tbadge ${tCls(tier)}">${tier}</div><span style="font-size:11px;color:var(--text2)"><strong style="color:var(--text)">${g.length}</strong> picks</span></div><div class="champ-grid">${g.map(c=>`<div class="champ-card" onclick="openChamp('${c.n}')"><img class="cc-img" src="${cImg(c.n)}" onerror="this.style.background='var(--bg3)'"><div class="cc-body"><div class="cc-name">${c.n}</div><div class="cc-wr ${wrC(c.wr)}">${c.wr.toFixed(1)}%</div></div></div>`).join('')}</div></div>`;
  }).join('');
}
function openChamp(name){
  const c=CHAMPS.find(x=>x.n===name);if(!c)return;
  document.getElementById('tv').style.display='none';
  document.getElementById('hero').style.display='none';
  const pg=document.getElementById('cpg');
  pg.classList.add('open');
  window.scrollTo({top:0,behavior:'smooth'});
  const sl=cSlug(name);
  document.getElementById('cpb').innerHTML=`

<div class="info-card"><div class="ic-hdr">Botas</div><div class="ic-body" style="display:flex;align-items:center;gap:12px">${iImg(c.build.boots.n)?`<img src="${iImg(c.build.boots.n)}" style="width:44px;height:44px;border-radius:var(--rs);object-fit:cover" onerror="this.style.display='none'">`:''}
<div><div style="font-size:13px;font-weight:600">${c.build.boots.n}</div><div style="font-size:11px;color:var(--text2)">${c.build.boots.r}</div></div></div></div>

<div class="item-num">${i+1}</div></div><div class="item-lbl">${it.n.split(' ')[0]}</div></div>`).join('')}</div>

function closeChamp(){document.getElementById('cpg').classList.remove('open');document.getElementById('tv').style.display='';document.getElementById('hero').style.display='';window.scrollTo({top:0,behavior:'smooth'})}
function cpTab(btn,id){document.querySelectorAll('.cp-tab').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.cp-panel').forEach(p=>p.classList.remove('active'));btn.classList.add('active');document.getElementById(id).classList.add('active')}
function renderPatch(){document.getElementById('pl').innerHTML=PATCH.map(p=>`<div class="pi" onclick="${CHAMPS.find(c=>c.n===p.c)?`openChamp('${p.c}');showPage('champions')`:''}"><div class="pi-bar pi-${p.t==='adj'?'adj':p.t==='buff'?'buff':'nerf'}"></div>${CHAMPS.find(c=>c.n===p.c)?`<img class="pi-img" src="${cImg(p.c)}" onerror="this.style.background='var(--bg3)'">`:`<div style="width:40px;height:40px;border-radius:var(--rs);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">⚙️</div>`}<div><div style="display:flex;align-items:center;gap:8px;margin-bottom:3px"><span class="pi-name">${p.c}</span><span class="chg-badge ${p.t==='buff'?'chg-buff':p.t==='nerf'?'chg-nerf':'chg-adj'}">${p.t==='buff'?'Buff':p.t==='nerf'?'Nerf':'Adjust'}</span></div><div class="pi-desc">${p.d}</div></div></div>`).join('')}
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(name==='champions'){document.getElementById('hero').style.display='';if(!document.getElementById('cpg').classList.contains('open'))document.getElementById('tv').style.display='';}
  else{document.getElementById('hero').style.display='none';}
  document.querySelectorAll('.dnb,.mnb').forEach(b=>{b.classList.toggle('active',b.getAttribute('onclick')&&b.getAttribute('onclick').includes("'"+name+"'"))});
}
function qAsk(t){document.getElementById('ai-inp').value=t;sendAI()}
function aiKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAI()}}
async function sendAI(){
  if(aiLoading)return;
  const inp=document.getElementById('ai-inp');const txt=inp.value.trim();if(!txt)return;
  inp.value='';aiLoading=true;document.getElementById('ai-send').disabled=true;
  addMsg('user',txt);aiHistory.push({role:'user',content:txt});
  const tid=addThink();
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'Eres experto en Wild Rift patch 7.1d. Meta: bruisers y fighters top, Lee Sin/Viego jungla, Orianna/Zed mid, Xayah ADC, Nami support. Responde en español, conciso. Usa <strong> para negritas.',messages:aiHistory})});
    const d=await r.json();const reply=d.content?.find(b=>b.type==='text')?.text||'Error.';
    removeThink(tid);addMsg('ai',reply);aiHistory.push({role:'assistant',content:reply});
  }catch{removeThink(tid);addMsg('ai','Sin conexión a la IA. Requiere API key de Anthropic.')}
  aiLoading=false;document.getElementById('ai-send').disabled=false;
}
let tn=0;
function addMsg(r,t){const el=document.createElement('div');el.className=`ai-msg ai-${r==='user'?'user':'bot'}`;el.innerHTML=r==='user'?t.replace(/</g,'&lt;'):t;document.getElementById('ai-msgs').appendChild(el);el.scrollIntoView({behavior:'smooth',block:'end'})}
function addThink(){const id='t'+(++tn);const el=document.createElement('div');el.id=id;el.className='ai-think';el.innerHTML='<span class="ai-d"></span><span class="ai-d"></span><span class="ai-d"></span> Analizando patch 7.1d...';document.getElementById('ai-msgs').appendChild(el);el.scrollIntoView({behavior:'smooth',block:'end'});return id}
function removeThink(id){document.getElementById(id)?.remove()}
renderTier();renderPatch();fetchLive();

</script>
